{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h3>Company Registration</h3>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
            <input type="text" name="company_name" class="form-control mb-2" placeholder="Company Name" required>
            <input type="url" name="website" class="form-control mb-2" placeholder="Website (e.g., https://google.com)" required>
            <button type="submit" class="btn btn-success w-100">Submit for Approval</button>
        </form>
    </div>
</div>
{% endblock %}
